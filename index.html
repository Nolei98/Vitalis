<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vitalis — Fresh Nutrition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600;1,800&display=swap" rel="stylesheet">
    <script>
      // Extensão do Tailwind (CDN) com os design tokens "Fresh / Orgânica".
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              green: { 900: '#1B4332', 700: '#2D6A4F', 500: '#40916C' },
              lime: { 400: '#74C69D', 300: '#95D5B2' },
              accent: { 500: '#FB8500', 400: '#FFB703' },
              surface: { DEFAULT: '#FFFFFF', soft: '#F2F8F4' },
              ink: { strong: '#1B2D24', soft: '#5B6B62' },
            },
            fontFamily: {
              sans: ['Poppins', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              display: ['Poppins', 'ui-sans-serif', 'sans-serif'],
            },
            borderRadius: { card: '28px', image: '40px', pill: '999px' },
            boxShadow: {
              soft: '0 18px 40px -12px rgba(45,106,79,.25)',
              glow: '0 14px 34px -10px rgba(251,133,0,.45)',
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --green-900: #1B4332;
        --green-700: #2D6A4F;
        --green-500: #40916C;
        --lime-400: #74C69D;
        --lime-300: #95D5B2;
        --accent-500: #FB8500;
        --accent-400: #FFB703;
        --surface: #FFFFFF;
        --surface-soft: #F2F8F4;
        --text-strong: #1B2D24;
        --text-soft: #5B6B62;
        --r-card: 28px;
        --r-image: 40px;
        --shadow-soft: 0 18px 40px -12px rgba(45, 106, 79, .25);
      }

      html { scroll-behavior: smooth; }

      body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--surface-soft);
        color: var(--text-strong);
        overflow-x: hidden;
        min-height: 100vh;
        position: relative;
        letter-spacing: -0.01em;
      }

      /* Gradiente assinatura para headers imersivos */
      .bg-signature {
        background: linear-gradient(160deg, var(--green-900) 0%, var(--green-500) 55%, var(--lime-400) 110%);
      }
      .text-gradient {
        background: linear-gradient(120deg, var(--green-700), var(--lime-400));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      /* ===== Cards ===== */
      .modern-card,
      .card-fresh {
        background: var(--surface);
        border: 1px solid rgba(45, 106, 79, 0.08);
        box-shadow: var(--shadow-soft);
        transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease;
        border-radius: var(--r-card);
      }
      .modern-card:hover,
      .card-fresh:hover {
        transform: translateY(-4px);
        box-shadow: 0 26px 54px -14px rgba(45, 106, 79, 0.32);
      }
      .press:active { transform: scale(0.98); }

      /* ===== Divisor em blob/onda ===== */
      .blob-divider {
        width: 100%;
        height: 48px;
        display: block;
        line-height: 0;
      }
      .blob-shape {
        border-radius: 42% 58% 63% 37% / 45% 38% 62% 55%;
      }

      /* ===== Decorações flutuantes ===== */
      .float-decor {
        position: absolute;
        pointer-events: none;
        filter: blur(2px);
        opacity: 0.5;
        animation: drift 14s ease-in-out infinite;
      }
      .float-decor.slow { animation-duration: 22s; }
      .float-decor.delay { animation-delay: -7s; }
      @keyframes drift {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(14px, -22px) rotate(8deg); }
      }

      /* ===== FAB ===== */
      .fab {
        background: linear-gradient(145deg, var(--accent-400), var(--accent-500));
        color: #fff;
        box-shadow: 0 14px 34px -10px rgba(251, 133, 0, 0.55);
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
      }
      .fab:hover { transform: translateY(-2px) scale(1.05); }
      .fab:active { transform: scale(0.92); }

      /* ===== Pílula / botões ===== */
      .btn-pill {
        border-radius: 999px;
        transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.3s ease;
      }
      .btn-pill:hover { transform: translateY(-1px); }
      .btn-pill:active { transform: scale(0.97); }

      /* ===== Cápsula de imagem (avatar emoji) ===== */
      .capsule {
        border-radius: var(--r-image);
        background: linear-gradient(150deg, var(--lime-300), var(--lime-400));
        box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.4), 0 10px 24px -10px rgba(45, 106, 79, 0.4);
      }

      /* ===== Anel de progresso ===== */
      .ring-track { stroke: rgba(45, 106, 79, 0.12); }
      .ring-progress {
        stroke-linecap: round;
        transition: stroke-dashoffset 1.1s cubic-bezier(0.22, 1, 0.36, 1);
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }

      /* ===== Bottom nav flutuante ===== */
      .bottom-nav {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(16px);
        box-shadow: 0 -6px 30px -8px rgba(45, 106, 79, 0.25), 0 18px 40px -12px rgba(45, 106, 79, 0.25);
        border: 1px solid rgba(45, 106, 79, 0.06);
      }

      /* ===== Inputs ===== */
      input, select, textarea {
        border: 2px solid transparent;
        transition: all 0.25s ease;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--green-500);
        background: #fff;
        box-shadow: 0 10px 25px -8px rgba(45, 106, 79, 0.18);
        outline: none;
      }

      /* ===== Animações ===== */
      @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes popIn { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1); } }
      .animate-fadeIn { animation: fadeIn 0.6s ease-out forwards; }
      .animate-fadeInUp { animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
      .animate-pop { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

      .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--surface-soft); }
      ::-webkit-scrollbar-thumb { background: var(--lime-400); border-radius: 10px; }

      /* ===== Acessibilidade: reduzir movimento ===== */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
        .float-decor { animation: none !important; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "url": "https://esm.sh/url@^0.11.4"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
